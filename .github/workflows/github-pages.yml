# Build static site to `out/` and deploy to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions.
#
# Project site URL: https://<user>.github.io/<repo>/
#   → BASE_PATH must be /repo (set below from the repository name).
#
# User/org site (repo named <user>.github.io, site at root URL):
#   → Set BASE_PATH to empty: replace the build env with BASE_PATH: ""

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
